<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignSpeak</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✋</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
<base target="_blank">
</head>
<body>

    
    <div class="hand-container">
        <img src="assets/images/left_hand.jpg" class="hand-left" alt="Left Hand">
        <img src="assets/images/right_hand.jpg" class="hand-right" alt="Right Hand">
    </div>

    
    <div class="top-label-container">
        <div class="pill-label">SIGN SPEAK</div>
    </div>

    
    <div class="center-wrap">
        
        <div class="glass-box-top">
            <div class="camera-wrapper">
                <video id="camera-feed" class="camera-feed" autoplay playsinline muted></video>
                <canvas id="camera-canvas"></canvas>
            </div>
            <div id="camera-placeholder" class="camera-placeholder">جاري تشغيل الكاميرا...</div>
        </div>

        
        <div class="glass-box-bottom">
            <div class="bottom-left-content">
               
                <div class="sentence-label-wrapper">
                    <span class="sentence-label-tag">الجملة</span>
                    <div id="sentence-display" class="sentence-display"></div>
                </div>
                
                
                <div class="result-wrapper">
                    <div id="result-label" class="result-label empty">لا يوجد نتيجة</div>
                </div>
            </div>
            <button id="clear-btn" class="clear-btn" type="button">مسح</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
